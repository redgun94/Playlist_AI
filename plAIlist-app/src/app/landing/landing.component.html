<div class="landing">
  <nav class="landing-nav">
    <div class="landing-nav-left">
      <h1 class="landing-logo">🎵 PlAIlist</h1>
    </div>
    <div class="landing-nav-right">
      <button class="btn-outline" (click)="goToLogin()">Login</button>
      <button class="btn-primary" (click)="goToSignup()">Sign Up</button>
    </div>
  </nav>

  <main class="landing-main">
    <div class="landing-hero">
      <div class="landing-hero-text">
        <div class="landing-badge">Powered by AI</div>
        <h2 class="landing-title">
          Crea Playlists
          <span class="landing-title-accent">Perfectas con IA</span>
        </h2>
        <p class="landing-description">
          Descubre una nueva forma de crear playlists. Usa inteligencia artificial
          o hazlo manualmente. Guarda, organiza y exporta a Spotify.
        </p>
        <div class="landing-actions">
          <button class="btn-primary btn-lg" (click)="goToSignup()">Comenzar Gratis</button>
          <button class="btn-outline btn-lg">Ver Demo</button>
        </div>
      </div>
      <div class="landing-hero-visual">
        <div class="playlist-card">
          <div class="playlist-card-header">
            <div class="playlist-card-cover"></div>
            <div class="playlist-card-info">
              <div class="playlist-card-line playlist-card-line--title"></div>
              <div class="playlist-card-line playlist-card-line--subtitle"></div>
            </div>
          </div>
          <div class="playlist-card-tracks">
            <div class="playlist-card-track"></div>
            <div class="playlist-card-track"></div>
            <div class="playlist-card-track"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
