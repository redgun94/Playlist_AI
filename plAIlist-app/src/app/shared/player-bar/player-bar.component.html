<div class="player-bar" *ngIf="spotifyLinked && isPremium">
  <div class="player-track">
    <img *ngIf="currentTrack?.album?.images?.[0]?.url"
         [src]="currentTrack?.album?.images?.[0]?.url"
         class="player-cover"
         [alt]="currentTrack?.name">
    <div class="player-track-info">
      <span class="player-track-name">{{ currentTrack?.name || 'Ninguna canción reproduciéndose' }}</span>
      <span class="player-track-artist">{{ currentTrack?.artists?.[0]?.name }}</span>
    </div>
  </div>

  <div class="player-controls">
    <button class="btn-player" (click)="previous()" [disabled]="!deviceReady" title="Anterior">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
      </svg>
    </button>
    <button class="btn-player btn-play" (click)="togglePlay()" [disabled]="!deviceReady" title="Reproducir/Pausar">
      <svg *ngIf="isPaused" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg *ngIf="!isPaused" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
      </svg>
    </button>
    <button class="btn-player" (click)="next()" [disabled]="!deviceReady" title="Siguiente">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 6h2v12h-2zM6 6v12l8.5-6z"/>
      </svg>
    </button>
  </div>

  <div class="player-status">
    <span *ngIf="!deviceReady && !sdkError">Conectando con Spotify...</span>
    <span *ngIf="sdkError" class="player-error">{{ sdkError }}</span>
  </div>
</div>
